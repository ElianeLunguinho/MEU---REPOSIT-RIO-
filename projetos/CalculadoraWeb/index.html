<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Web | Eliane Lunguinho</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="calculator">
        <div class="calculator-header">
            <h1><i class="fas fa-calculator"></i> Calculadora Web</h1>
            <a href="../../index.html#projects" class="back-link"><i class="fas fa-arrow-left"></i> Voltar ao Portfólio</a>
        </div>
        
        <div class="display">
            <input type="text" id="display" readonly placeholder="0">
        </div>
        
        <div class="buttons">
            <button class="btn operator" onclick="clearDisplay()">C</button>
            <button class="btn operator" onclick="deleteLast()">⌫</button>
            <button class="btn operator" onclick="appendOperator('%')">%</button>
            <button class="btn operator" onclick="appendOperator('/')">÷</button>
            
            <button class="btn" onclick="appendNumber('7')">7</button>
            <button class="btn" onclick="appendNumber('8')">8</button>
            <button class="btn" onclick="appendNumber('9')">9</button>
            <button class="btn operator" onclick="appendOperator('*')">×</button>
            
            <button class="btn" onclick="appendNumber('4')">4</button>
            <button class="btn" onclick="appendNumber('5')">5</button>
            <button class="btn" onclick="appendNumber('6')">6</button>
            <button class="btn operator" onclick="appendOperator('-')">−</button>
            
            <button class="btn" onclick="appendNumber('1')">1</button>
            <button class="btn" onclick="appendNumber('2')">2</button>
            <button class="btn" onclick="appendNumber('3')">3</button>
            <button class="btn operator" onclick="appendOperator('+')">+</button>
            
            <button class="btn zero" onclick="appendNumber('0')">0</button>
            <button class="btn" onclick="appendDecimal()">,</button>
            <button class="btn equals" onclick="calculate()">=</button>
        </div>
        
        <div class="calculator-footer">
            <p>Desenvolvido por <strong>Eliane Lunguinho</strong></p>
            <div class="tech-icons">
                <span class="tech-badge"><i class="fab fa-html5"></i> HTML</span>
                <span class="tech-badge"><i class="fab fa-css3-alt"></i> CSS</span>
                <span class="tech-badge"><i class="fab fa-js"></i> JavaScript</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
